
services:
  db:
    image: postgres:16
    container_name: mindweawe_postgres
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mindweawe
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: